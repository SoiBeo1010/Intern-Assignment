services:
  db:
    image: mysql:8.4
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: gscores_db
      MYSQL_USER: gscores
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    command: npm run start
    ports:
      - "4000:4000"
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: gscores
      DB_PASSWORD: secret
      DB_NAME: gscores_db
    volumes:
      - ./dataset:/dataset:ro
    depends_on:
      - db

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://backend:4000
    depends_on:
      - backend

volumes:
  db_data:
